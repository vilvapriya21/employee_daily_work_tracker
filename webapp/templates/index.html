<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Daily Work Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      padding: 32px 16px;
      color: #1e293b;
    }

    h1 {
      text-align: center;
      font-size: 1.7rem;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #64748b;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      display: grid;
      gap: 24px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      font-size: 1.15rem;
      font-weight: 600;
      color: #1e3a5f;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 .icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 520px) {
      .form-grid { grid-template-columns: 1fr; }
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input, textarea {
      border: 1.5px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.95rem;
      color: #1e293b;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }

    input:focus, textarea:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      background: #fff;
    }

    textarea { resize: vertical; min-height: 90px; }

    .hint {
      font-size: 0.78rem;
      color: #94a3b8;
    }

    .btn {
      margin-top: 8px;
      padding: 11px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }

    .btn-secondary {
      background: #e2e8f0;
      color: #1e3a5f;
    }
    .btn-secondary:hover { background: #cbd5e1; }

    /* ── Alert banners ── */
    #form-alert {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 500;
    }

    .alert-success { background: #dcfce7; color: #166534; border: 1px solid #86efac; }
    .alert-error   { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

    /* ── Summary panel ── */
    #summary-panel {
      display: none;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .stat {
      background: #f1f5f9;
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .stat .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2563eb;
      line-height: 1;
    }

    .stat .label {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .low-hours-list {
      margin-top: 12px;
    }

    .low-hours-list h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .employee-tag {
      display: inline-block;
      background: #fef9c3;
      color: #854d0e;
      border: 1px solid #fde047;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      margin: 3px;
    }

    .summary-meta {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 14px;
      text-align: right;
    }

    #summary-loading {
      display: none;
      text-align: center;
      color: #94a3b8;
      padding: 20px;
      font-size: 0.9rem;
    }

    #summary-error {
      display: none;
      color: #991b1b;
      font-size: 0.9rem;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>📋 Employee Daily Work Tracker</h1>
  <p class="subtitle">Submit your daily work log and view team summaries</p>

  <div class="container">

    <!-- ── Submit Form ── -->
    <div class="card">
      <h2><span class="icon" style="background:#dbeafe">📝</span> Submit Work Log</h2>

      <form id="log-form">
        <div class="form-grid">

          <div class="field">
            <label for="employee_name">Employee Name</label>
            <input type="text" id="employee_name" name="employee_name"
                   placeholder="e.g. Jane Smith" required />
          </div>

          <div class="field">
            <label for="employee_id">Employee ID</label>
            <input type="text" id="employee_id" name="employee_id"
                   placeholder="e.g. 1042 (must be a number)" required />
          </div>

          <div class="field full">
            <label for="task_completed">Task Completed</label>
            <textarea id="task_completed" name="task_completed"
                      placeholder="Describe the tasks you completed today..."
                      required></textarea>
          </div>

          <div class="field">
            <label for="hours_worked">Hours Worked</label>
            <input type="number" id="hours_worked" name="hours_worked"
                   placeholder="0 – 8" min="0" max="8" step="0.5" value="0" required />
            <span class="hint">Max 8 hours per employee per day</span>
          </div>

        </div>

        <button type="submit" class="btn btn-primary">Submit Work Log</button>

        <div id="form-alert"></div>
      </form>
    </div>

    <!-- ── Summary Panel ── -->
    <div class="card">
      <h2><span class="icon" style="background:#dcfce7">📊</span> Team Summary</h2>

      <button class="btn btn-secondary" onclick="loadSummary()">Fetch Latest Summary</button>

      <div id="summary-loading">Loading summary...</div>
      <div id="summary-error"></div>

      <div id="summary-panel">
        <div class="summary-grid">
          <div class="stat">
            <div class="value" id="s-total">–</div>
            <div class="label">Total submissions</div>
          </div>
          <div class="stat">
            <div class="value" id="s-hours">–</div>
            <div class="label">Total hours</div>
          </div>
          <div class="stat">
            <div class="value" id="s-avg">–</div>
            <div class="label">Avg hours / employee</div>
          </div>
          <div class="stat">
            <div class="value" id="s-low">–</div>
            <div class="label">Worked &lt; 4 hrs</div>
          </div>
        </div>

        <div class="low-hours-list" id="low-hours-container" style="display:none">
          <h3>Employees with less than 4 hours</h3>
          <div id="low-hours-names"></div>
        </div>

        <div class="summary-meta" id="summary-meta"></div>
      </div>
    </div>

  </div>

  <script>
    // ── Form Submission ──────────────────────────────────────────────────────
    document.getElementById('log-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const btn   = e.target.querySelector('button[type=submit]');
      const alert = document.getElementById('form-alert');

      btn.disabled    = true;
      btn.textContent = 'Submitting…';
      alert.style.display = 'none';

      const data = new FormData(e.target);

      try {
        const res  = await fetch('/submit', { method: 'POST', body: data });
        const json = await res.json();

        if (res.ok && !json.error) {
          alert.className       = 'alert-success';
          alert.textContent     = json.message || '✅ Work log submitted successfully!';
          alert.style.display   = 'block';
          e.target.reset();
          document.getElementById('hours_worked').value = '0';
        } else {
          alert.className     = 'alert-error';
          alert.textContent   = '❌ ' + (json.error || json.message || 'Something went wrong.');
          alert.style.display = 'block';
        }
      } catch (err) {
        alert.className     = 'alert-error';
        alert.textContent   = '❌ Network error: ' + err.message;
        alert.style.display = 'block';
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Submit Work Log';
      }
    });

    // ── Fetch Summary ────────────────────────────────────────────────────────
    async function loadSummary() {
      const panel   = document.getElementById('summary-panel');
      const loading = document.getElementById('summary-loading');
      const errEl   = document.getElementById('summary-error');

      panel.style.display   = 'none';
      errEl.style.display   = 'none';
      loading.style.display = 'block';

      try {
        const res  = await fetch('/summary');
        const json = await res.json();

        if (!res.ok || json.error) {
          errEl.textContent   = '❌ ' + (json.error || 'Could not load summary.');
          errEl.style.display = 'block';
          return;
        }

        document.getElementById('s-total').textContent = json.total_employees_submitted ?? '–';
        document.getElementById('s-hours').textContent = json.total_hours_worked ?? '–';
        document.getElementById('s-avg').textContent   =
          json.average_hours != null ? Number(json.average_hours).toFixed(1) : '–';
        document.getElementById('s-low').textContent   =
          json.employees_less_than_4_hrs ? json.employees_less_than_4_hrs.length : '–';

        const lowList = json.employees_less_than_4_hrs || [];
        const lowCont = document.getElementById('low-hours-container');
        const lowNames = document.getElementById('low-hours-names');

        if (lowList.length > 0) {
          lowNames.innerHTML = lowList
            .map(n => `<span class="employee-tag">${n}</span>`)
            .join('');
          lowCont.style.display = 'block';
        } else {
          lowCont.style.display = 'none';
        }

        if (json.generated_at) {
          document.getElementById('summary-meta').textContent =
            'Last generated: ' + new Date(json.generated_at).toLocaleString();
        }

        panel.style.display = 'block';

      } catch (err) {
        errEl.textContent   = '❌ Network error: ' + err.message;
        errEl.style.display = 'block';
      } finally {
        loading.style.display = 'none';
      }
    }
  </script>

</body>
</html>
